name: xmllint

on:
  push:
    branches:
      - master

jobs:
  build:
    name: XML validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libxml2-utils
      - name: Download XSD
        run: curl -L https://github.com/mapsforge/mapsforge/raw/refs/heads/master/resources/renderTheme.xsd > renderTheme.xsd
      - name: Run xmllint
        run: xmllint --schema renderTheme.xsd --noout GPXSee.xml
